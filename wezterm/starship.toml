add_newline = false
command_timeout = 1000
palette = "sunset_band"

format = """
[Óā∂](fg:band_start)\
[$directory](bg:band_start fg:ink bold)\
[Óāį](fg:band_start bg:band_mid)\
$fill\
[Óāį](fg:band_mid bg:band_end)\
[ ](bg:band_end)\
[Óāī](fg:band_end)\
$line_break\
$git_branch$git_status$cmd_duration\
$line_break\
$character"""

[palettes.sunset_band]
ink = "#f5efe4"
muted = "#9fb1cd"
band_start = "#315f84"
band_mid = "#5a4e78"
band_end = "#8a536c"
gold = "#f4c084"
mint = "#81d4b3"
ember = "#ff8f7a"

[character]
success_symbol = "[‚ĚĮ](bold fg:mint)"
error_symbol = "[‚ĚĮ](bold fg:ember)"

[directory]
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "‚Ä¶/"
format = "[ ůįČč $path ]($style)[$read_only]($read_only_style)"
style = "bg:band_start fg:ink bold"
read_only = " ÔÄ£"
read_only_style = "bg:band_start fg:gold bold"

[git_branch]
symbol = "Ôźė "
format = "[ $symbol$branch ]($style)"
style = "bold fg:gold"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold fg:muted"
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "¬Ľ${count}"
deleted = "‚úē${count}"
conflicted = "=${count}"

[cmd_duration]
min_time = 500
format = "[ ůĪéę $duration ]($style)"
